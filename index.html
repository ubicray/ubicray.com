<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ubicray makes software. Currently: Locket, an on-device AI journal."
    />
    <title>ubicray</title>
    <link rel="icon" type="image/png" href="icon.png" />
    <link rel="apple-touch-icon" href="icon.png" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-bg: #f8faf9;
        --color-surface: #ffffff;
        --color-fg: #191c1c;
        --color-fg-soft: #3c4949;
        --color-fg-faint: #6c7a79;
        --color-border: #bbc9c8;
        --color-border-soft: #d8dada;
        --color-primary: #006a6a;
        --font-sans: "Plus Jakarta Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
        --font-serif: "Newsreader", ui-serif, Georgia, serif;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,500;1,6..72,600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen bg-bg font-sans text-fg antialiased">
    <main class="mx-auto max-w-2xl px-6 pb-24 pt-16 sm:pt-24">
      <header>
        <p class="text-xs font-semibold uppercase tracking-[0.24em] text-fg-faint">ubicray</p>
        <h1 class="mt-6 font-serif text-[44px] font-medium leading-[1.05] tracking-[-0.02em] sm:text-[64px]">
          Software</em>.
        </h1>
      </header>

      <section class="mt-20 sm:mt-24">
        <p class="mb-5 flex items-center gap-2 text-xs font-semibold uppercase tracking-[0.22em] text-primary">
          <span class="inline-block h-1.5 w-1.5 rounded-full bg-primary"></span>
          Currently
        </p>

        <a
          href="locket/"
          class="group flex items-start gap-5 rounded-[28px] border border-border bg-surface px-5 py-5 transition-colors hover:border-primary sm:gap-6 sm:px-7 sm:py-6"
        >
          <img
            src="locket-play-store-icon.png"
            alt=""
            width="64"
            height="64"
            class="h-14 w-14 shrink-0 rounded-[16px] sm:h-16 sm:w-16 sm:rounded-[18px]"
          />
          <div class="flex-1 pt-0.5">
            <h2 class="font-serif text-2xl font-medium tracking-tight sm:text-[26px]">Locket</h2>
            <p class="mt-1 leading-relaxed text-fg-soft">
              A journal that writes back. On your phone, not in the cloud.
            </p>
            <span class="mt-3 inline-flex items-center gap-1.5 text-sm font-medium text-primary">
              Open
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-hover:translate-x-0.5">
                <path d="M5 12h14M13 5l7 7-7 7" />
              </svg>
            </span>
          </div>
        </a>
      </section>

      <footer class="mt-24 flex flex-wrap items-center justify-between gap-3 border-t border-border-soft pt-6 text-sm text-fg-faint">
        <a href="https://www.linkedin.com/in/eabbasov/" class="transition-colors hover:text-primary">LinkedIn</a>
      </footer>
    </main>
  </body>
</html>
